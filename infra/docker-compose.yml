version: "1.0"

services:

  frontend:
    build: ../frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    build: ../backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - postgres

  master-agent:
    build: ../Agents/master-agent
    env_file:
      - .env

  worker-agent:
    build: ../Agents/worker-agent
    env_file:
      - .env

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: orchestrator
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
